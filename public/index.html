<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>⚡ Pump Radar</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Cairo:wght@400;600;700&display=swap" rel="stylesheet">
<style>
:root{--bg:#0a0a0f;--card:#111118;--border:#1e1e2e;--green:#00ff88;--red:#ff3366;--yellow:#ffcc00;--blue:#00ccff;--text:#e0e0ff;--muted:#555577;}
*{margin:0;padding:0;box-sizing:border-box;}
body{background:var(--bg);color:var(--text);font-family:'Cairo',sans-serif;min-height:100vh;}
body::before{content:'';position:fixed;inset:0;background:radial-gradient(ellipse at 20% 20%,rgba(0,255,136,0.05),transparent 50%),radial-gradient(ellipse at 80% 80%,rgba(0,204,255,0.05),transparent 50%);pointer-events:none;z-index:0;}
.header{position:sticky;top:0;z-index:100;background:rgba(10,10,15,0.97);backdrop-filter:blur(20px);border-bottom:1px solid var(--border);padding:14px 16px;}
.hrow{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;}
.logo{font-family:'Orbitron',monospace;font-size:18px;font-weight:900;background:linear-gradient(135deg,var(--green),var(--blue));-webkit-background-clip:text;-webkit-text-fill-color:transparent;}
.status{display:flex;align-items:center;gap:6px;font-size:11px;padding:4px 12px;border-radius:20px;border:1px solid var(--border);}
.dot{width:7px;height:7px;border-radius:50%;background:var(--muted);}
.dot.on{background:var(--green);animation:pulse 1.5s infinite;}
@keyframes pulse{50%{opacity:0.4;transform:scale(0.8);}}
.filters{display:flex;gap:7px;overflow-x:auto;scrollbar-width:none;}
.filters::-webkit-scrollbar{display:none;}
.fb{white-space:nowrap;padding:5px 14px;border-radius:20px;border:1px solid var(--border);background:transparent;color:var(--muted);font-family:'Cairo',sans-serif;font-size:12px;cursor:pointer;transition:all 0.2s;}
.fb.active{background:rgba(0,255,136,0.15);border-color:var(--green);color:var(--green);}
.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;padding:12px 16px;border-bottom:1px solid var(--border);position:relative;z-index:1;}
.stat{text-align:center;}
.sv{font-family:'Orbitron',monospace;font-size:16px;font-weight:700;color:var(--green);}
.sl{font-size:9px;color:var(--muted);margin-top:2px;}
.list{padding:10px 12px 90px;position:relative;z-index:1;}
.coin{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:13px;margin-bottom:9px;animation:slideIn 0.35s ease forwards;opacity:0;transform:translateY(8px);position:relative;overflow:hidden;transition:border-color 0.2s,transform 0.2s;}
.coin::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,transparent,var(--green),transparent);opacity:0;transition:opacity 0.3s;}
.coin:hover::before{opacity:1;}
.coin:hover{border-color:rgba(0,255,136,0.3);transform:translateY(-1px);}
.coin.flash{animation:flash 0.8s ease;}
@keyframes flash{0%,100%{border-color:var(--border);}50%{border-color:var(--green);box-shadow:0 0 25px rgba(0,255,136,0.5);}}
@keyframes slideIn{to{opacity:1;transform:translateY(0);}}
.ctop{display:flex;align-items:center;gap:11px;margin-bottom:10px;}
.cimg{width:46px;height:46px;border-radius:50%;background:linear-gradient(135deg,#1a1a2e,#2a2a4e);display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0;border:2px solid var(--border);overflow:hidden;}
.cimg img{width:100%;height:100%;object-fit:cover;border-radius:50%;}
.cinfo{flex:1;min-width:0;}
.cname{font-size:15px;font-weight:700;color:white;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.csym{font-size:11px;color:var(--muted);font-family:'Orbitron',monospace;margin-top:1px;}
.sring{width:44px;height:44px;position:relative;display:flex;align-items:center;justify-content:center;}
.sring svg{position:absolute;top:0;left:0;transform:rotate(-90deg);}
.snum{font-family:'Orbitron',monospace;font-size:13px;font-weight:700;position:relative;z-index:1;}
.badges{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:10px;}
.badge{font-size:10px;padding:2px 8px;border-radius:10px;font-weight:700;}
.btw{background:rgba(0,204,255,0.15);color:var(--blue);border:1px solid rgba(0,204,255,0.3);}
.btg{background:rgba(0,136,255,0.15);color:#4da6ff;border:1px solid rgba(0,136,255,0.3);}
.bweb{background:rgba(255,204,0,0.15);color:var(--yellow);border:1px solid rgba(255,204,0,0.3);}
.bhot{background:rgba(255,51,102,0.2);color:var(--red);border:1px solid rgba(255,51,102,0.3);}
.bnew{background:rgba(0,255,136,0.15);color:var(--green);border:1px solid rgba(0,255,136,0.3);}
.cdesc{font-size:11px;color:var(--muted);margin-bottom:10px;line-height:1.5;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;}
.cfoot{display:flex;justify-content:space-between;align-items:center;padding-top:9px;border-top:1px solid var(--border);}
.cage{font-size:11px;color:var(--muted);}
.mc{font-family:'Orbitron',monospace;font-size:11px;color:var(--yellow);}
.btns{display:flex;gap:6px;}
.btn{padding:5px 13px;border-radius:20px;font-size:11px;font-weight:700;cursor:pointer;text-decoration:none;transition:all 0.2s;font-family:'Cairo',sans-serif;border:1px solid rgba(0,255,136,0.4);background:rgba(0,255,136,0.1);color:var(--green);}
.btn.dex{border-color:rgba(0,204,255,0.4);background:rgba(0,204,255,0.1);color:var(--blue);}
.btn:hover{transform:scale(1.05);}
.empty{text-align:center;padding:80px 20px;color:var(--muted);position:relative;z-index:1;}
.empty .e{font-size:50px;margin-bottom:14px;}
.bottom{position:fixed;bottom:0;left:0;right:0;background:rgba(10,10,15,0.97);backdrop-filter:blur(20px);border-top:1px solid var(--border);padding:12px 16px;display:flex;justify-content:space-between;align-items:center;z-index:100;}
.bcount{font-family:'Orbitron',monospace;font-size:22px;font-weight:900;color:var(--green);}
.binfo{font-size:11px;color:var(--muted);}
.sbtn{background:rgba(255,255,255,0.05);border:1px solid var(--border);color:var(--text);padding:8px 16px;border-radius:20px;font-size:13px;cursor:pointer;font-family:'Cairo',sans-serif;}
.sbtn.on{border-color:var(--green);color:var(--green);}
.notif{position:fixed;top:80px;left:50%;transform:translateX(-50%);background:rgba(0,255,136,0.15);border:1px solid var(--green);color:var(--green);padding:10px 20px;border-radius:12px;font-size:13px;font-weight:700;z-index:999;animation:nIn 0.3s ease;white-space:nowrap;}
@keyframes nIn{from{opacity:0;top:60px;}to{opacity:1;top:80px;}}
</style>
</head>
<body>
<div class="header">
  <div class="hrow">
    <div class="logo">⚡ PUMP RADAR</div>
    <div class="status"><div class="dot" id="dot"></div><span id="stxt">جاري الاتصال...</span></div>
  </div>
  <div class="filters">
    <button class="fb active" onclick="setF('all',this)">🔥 الكل</button>
    <button class="fb" onclick="setF('score',this)">⭐ الأعلى تقييماً</button>
    <button class="fb" onclick="setF('social',this)">📱 لديه سوشيال</button>
    <button class="fb" onclick="setF('mc',this)">💰 Market Cap</button>
  </div>
</div>
<div class="stats">
  <div class="stat"><div class="sv" id="s1">0</div><div class="sl">إجمالي</div></div>
  <div class="stat"><div class="sv" id="s2" style="color:var(--blue)">0</div><div class="sl">آخر دقيقة</div></div>
  <div class="stat"><div class="sv" id="s3" style="color:var(--yellow)">0%</div><div class="sl">متوسط التقييم</div></div>
  <div class="stat"><div class="sv" id="s4" style="color:var(--red)">0</div><div class="sl">مع سوشيال</div></div>
</div>
<div class="list" id="list">
  <div class="empty"><div class="e">📡</div><div>في انتظار العملات الجديدة...</div><div style="font-size:12px;margin-top:6px;opacity:0.6">كل عملة تظهر لحظة إطلاقها</div></div>
</div>
<div class="bottom">
  <div><div class="bcount" id="total">0</div><div class="binfo">عملة رُصدت</div></div>
  <div style="text-align:center"><div style="font-size:9px;color:var(--muted);margin-bottom:2px">آخر تحديث</div><div style="font-family:'Orbitron',monospace;font-size:12px;color:var(--green)" id="lupd">--</div></div>
  <button class="sbtn" id="sbtn" onclick="toggleSound()">🔔 تنبيه</button>
</div>
<script>
let coins=[],filter='all',soundOn=false,ws,audioCtx;
function emoji(s){const e=['🚀','🌙','💎','🔥','⚡','🎯','🐸','🦊','🐕','🦁','🐉','🌊','💫','🎪','🎭','🍀','🦋','🌈','🏆','🎮'];return e[(s||'?').charCodeAt(0)%e.length];}
function ago(ts){const d=Date.now()-ts,s=Math.floor(d/1000),m=Math.floor(s/60);if(s<60)return s+'ث';if(m<60)return m+'د';return Math.floor(m/60)+'س';}
function fmc(n){if(!n||n===0)return '$0';if(n>=1e6)return '$'+(n/1e6).toFixed(1)+'M';if(n>=1e3)return '$'+(n/1e3).toFixed(1)+'K';return '$'+n.toFixed(0);}
function sc(s){if(s>=75)return '#00ff88';if(s>=50)return '#ffcc00';if(s>=25)return '#ff9933';return '#555577';}
function beep(){if(!soundOn)return;try{if(!audioCtx)audioCtx=new(window.AudioContext||window.webkitAudioContext)();const o=audioCtx.createOscillator(),g=audioCtx.createGain();o.connect(g);g.connect(audioCtx.destination);o.frequency.setValueAtTime(800,audioCtx.currentTime);o.frequency.exponentialRampToValueAtTime(1200,audioCtx.currentTime+0.1);g.gain.setValueAtTime(0.3,audioCtx.currentTime);g.gain.exponentialRampToValueAtTime(0.001,audioCtx.currentTime+0.3);o.start();o.stop(audioCtx.currentTime+0.3);}catch(e){}}
function notif(msg){const n=document.createElement('div');n.className='notif';n.textContent=msg;document.body.appendChild(n);setTimeout(()=>n.remove(),3000);}
function toggleSound(){soundOn=!soundOn;const b=document.getElementById('sbtn');b.className='sbtn'+(soundOn?' on':'');b.textContent=soundOn?'🔔 مفعل':'🔔 تنبيه';}
function filtered(){let c=[...coins];if(filter==='score')c.sort((a,b)=>b.score-a.score);else if(filter==='social')c=c.filter(x=>x.twitter||x.telegram||x.website);else if(filter==='mc')c.sort((a,b)=>b.marketCap-a.marketCap);return c;}
function render(){
  const list=document.getElementById('list'),fc=filtered();
  if(!fc.length){list.innerHTML='<div class="empty"><div class="e">📡</div><div>في انتظار العملات الجديدة...</div><div style="font-size:12px;margin-top:6px;opacity:0.6">كل عملة تظهر لحظة إطلاقها</div></div>';return;}
  list.innerHTML=fc.map((c,i)=>{
    const col=sc(c.score),circ=2*Math.PI*16,dash=(c.score/100)*circ,isNew=(Date.now()-c.createdAt)<60000;
    return`<div class="coin${isNew?' flash':''}" style="animation-delay:${Math.min(i,10)*0.05}s">
      <div class="ctop">
        <div class="cimg">${c.image?`<img src="${c.image}" onerror="this.parentElement.textContent='${emoji(c.symbol)}'">`:emoji(c.symbol)}</div>
        <div class="cinfo"><div class="cname">${c.name}</div><div class="csym">${c.symbol}</div></div>
        <div class="sring">
          <svg width="44" height="44" viewBox="0 0 44 44">
            <circle cx="22" cy="22" r="16" fill="none" stroke="#1e1e2e" stroke-width="3"/>
            <circle cx="22" cy="22" r="16" fill="none" stroke="${col}" stroke-width="3" stroke-dasharray="${dash} ${circ}" stroke-linecap="round"/>
          </svg>
          <span class="snum" style="color:${col}">${c.score}</span>
        </div>
      </div>
      <div class="badges">
        ${isNew?'<span class="badge bnew">🆕 جديد الآن</span>':''}
        ${c.twitter?'<span class="badge btw">🐦 Twitter</span>':''}
        ${c.telegram?'<span class="badge btg">✈️ Telegram</span>':''}
        ${c.website?'<span class="badge bweb">🌐 Website</span>':''}
        ${c.score>=75?'<span class="badge bhot">⭐ واعد</span>':''}
      </div>
      ${c.description?`<div class="cdesc">${c.description}</div>`:''}
      <div class="cfoot">
        <div><div class="mc">${fmc(c.marketCap)}</div><div class="cage">⏱ ${ago(c.createdAt)}</div></div>
        <div class="btns">
          <a href="${c.dexLink}" target="_blank" class="btn dex">DEX</a>
          <a href="${c.pumpLink}" target="_blank" class="btn">Pump ↗</a>
        </div>
      </div>
    </div>`;
  }).join('');
  const now=Date.now(),lm=coins.filter(c=>(now-c.createdAt)<60000).length,ws2=coins.filter(c=>c.twitter||c.telegram||c.website).length,avg=coins.length?Math.round(coins.reduce((a,b)=>a+b.score,0)/coins.length):0;
  document.getElementById('s1').textContent=coins.length;
  document.getElementById('s2').textContent=lm;
  document.getElementById('s3').textContent=avg+'%';
  document.getElementById('s4').textContent=ws2;
  document.getElementById('total').textContent=coins.length;
  document.getElementById('lupd').textContent=new Date().toLocaleTimeString('ar');
}
function setF(f,btn){filter=f;document.querySelectorAll('.fb').forEach(b=>b.classList.remove('active'));btn.classList.add('active');render();}
function connect(){
  const p=location.protocol==='https:'?'wss':'ws';
  ws=new WebSocket(`${p}://${location.host}/ws`);
  ws.onopen=()=>{document.getElementById('dot').className='dot on';document.getElementById('stxt').textContent='متصل ✅';};
  ws.onmessage=(e)=>{
    const d=JSON.parse(e.data);
    if(d.type==='init'){coins=d.coins;render();}
    else if(d.type==='newCoin'){
      coins.unshift(d.coin);
      if(coins.length>100)coins=coins.slice(0,100);
      render();beep();
      if(d.coin.score>=50)notif(`🚀 ${d.coin.name} (${d.coin.symbol}) تقييم:${d.coin.score}`);
    }
  };
  ws.onclose=()=>{document.getElementById('dot').className='dot';document.getElementById('stxt').textContent='انقطع، إعادة...';setTimeout(connect,3000);};
}
connect();
setInterval(render,15000);
</script>
</body>
</html>
